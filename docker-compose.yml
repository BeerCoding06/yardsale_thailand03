# Docker Compose for Dokploy (https://dokploy.com)
# ผูกโดเมน www.yardsaleth.com ใน Dokploy หรือใช้ labels ด้านล่าง
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    # ไม่ต้อง expose port ถ้าใช้แค่ Traefik (Dokploy route ผ่าน domain)
    ports:
      - "3000:3000"

    networks:
      - dokploy-network

    labels:
      # ให้ Traefik ของ Dokploy ใช้ network นี้
      - "traefik.docker.network=dokploy-network"
      - "traefik.enable=true"
      # หลัก: https://www.yardsaleth.com -> Nuxt port 3000, HTTPS + Let's Encrypt
      - "traefik.http.routers.yardsaleth-app.rule=Host(`www.yardsaleth.com`)"
      - "traefik.http.routers.yardsaleth-app.entrypoints=websecure"
      - "traefik.http.routers.yardsaleth-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.yardsaleth-app.service=yardsaleth-app"
      - "traefik.http.services.yardsaleth-app.loadbalancer.server.port=3000"
      # redirect yardsaleth.com -> https://www.yardsaleth.com
      - "traefik.http.routers.yardsaleth-redirect.rule=Host(`yardsaleth.com`)"
      - "traefik.http.routers.yardsaleth-redirect.entrypoints=websecure"
      - "traefik.http.routers.yardsaleth-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.yardsaleth-redirect.service=yardsaleth-app"
      - "traefik.http.routers.yardsaleth-redirect.middlewares=redirect-to-www"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.permanent=true"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.regex=^https?://yardsaleth.com/(.*)"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.replacement=https://www.yardsaleth.com/$${1}"

    env_file:
      - .env
    environment:
      # =================
      # Database (External MySQL)
      # =================
      - DB_HOST=${DB_HOST:-157.85.98.150:3306}
      - DB_NAME=${DB_NAME:-nuxtcommerce_db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-RootBeer06032534}

      # =================
      # Public URL (Traefik)
      # =================
      - BASE_URL=${BASE_URL:-http://www.yardsaleth.com}

      # =================
      # Internal
      # =================
      - INTERNAL_BASE_URL=${INTERNAL_BASE_URL:-http://127.0.0.1:80}

    volumes:
      # Mount project root
      - .:/app

networks:
  dokploy-network:
    external: true
