services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"

    labels:
      # Traefik Configuration
      - "traefik.enable=true"
      # Main app: www.yardsaleth.com -> Nuxt on port 3000
      - "traefik.http.routers.app.rule=Host(`www.yardsaleth.com`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.routers.app.service=app"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
      # Redirect yardsaleth.com -> www.yardsaleth.com (avoids 404 when opening without www)
      - "traefik.http.routers.app-redirect.rule=Host(`yardsaleth.com`)"
      - "traefik.http.routers.app-redirect.entrypoints=web"
      - "traefik.http.routers.app-redirect.service=app"
      - "traefik.http.routers.app-redirect.middlewares=redirect-to-www"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.permanent=true"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.regex=^https?://yardsaleth.com/(.*)"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.replacement=https://www.yardsaleth.com/$${1}"

    env_file:
      - .env
    environment:
      # =================
      # Database (External MySQL)
      # =================
      - DB_HOST=${DB_HOST:-157.85.98.150:3306}
      - DB_NAME=${DB_NAME:-nuxtcommerce_db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-RootBeer06032534}

      # =================
      # WordPress Configuration
      # =================
      - WP_BASE_URL=${WP_BASE_URL:-http://157.85.98.150:8080}
      - WP_BASIC_AUTH=${WP_BASIC_AUTH:-}
      - WP_CONSUMER_KEY=${WP_CONSUMER_KEY:-}
      - WP_CONSUMER_SECRET=${WP_CONSUMER_SECRET:-}

      # =================
      # Public URL (Traefik)
      # =================
      - BASE_URL=${BASE_URL:-http://www.yardsaleth.com}

      # =================
      # Internal
      # =================
      - INTERNAL_BASE_URL=${INTERNAL_BASE_URL:-http://127.0.0.1:80}

    volumes:
      # Mount project root
      - .:/app
