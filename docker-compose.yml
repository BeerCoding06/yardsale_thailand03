# Dokploy: deploy ไฟล์นี้ไฟล์เดียว — PostgreSQL + Express API + Nuxt
# เครือข่าย traefik ของ Dokploy (สร้างบน host แล้ว: dokploy-network)
#
# โดเมน:
#   Frontend — https://yardsaleth.com (Traefik labels บน service app; www → apex)
#   Backend  — https://api.yardsaleth.com ผ่าน Caddy บน host (ไม่ใช้ Traefik สำหรับ API)
#
# API + Caddy: บนเซิร์ฟเวอร์ที่ Caddy จับ :443 อยู่แล้ว — backend publish ที่ 127.0.0.1:4000
# ให้เพิ่มใน Caddyfile แล้ว reload:
#   api.yardsaleth.com {
#       reverse_proxy 172.17.0.1:4000
#   }
# ถ้า reverse_proxy ไม่ถึง host ให้ใส่ใน compose ของ Caddy: extra_hosts: ["host.docker.internal:host-gateway"]
# แล้วใช้ reverse_proxy host.docker.internal:4000
# ลบโดเมน api.yardsaleth.com ออกจาก Domains ใน Dokploy (กันชน TLS กับ Caddy)
#
# ตั้งค่าใน Dokploy → Environment (ของแอป Compose นี้) ก่อน Deploy:
#   POSTGRES_PASSWORD และ JWT_SECRET ต้องมีค่า — ใส่เป็นสองแถว แยก Key / Value
#   ถ้า Dokploy ยัง error เรื่อง missing variable ให้เช็กว่าใส่ในแอป Compose ตัวนี้ ไม่ใช่แค่ Project
#   CORS_ORIGINS, BASE_URL, NUXT_* ฯลฯ
#   BASE_URL, NUXT_PUBLIC_CMS_API_BASE, NUXT_PUBLIC_YARDSALE_BACKEND_ORIGIN, NUXT_PUBLIC_STORE_BANK_TRANSFER_INFO, NUXT_PUBLIC_PROMPTPAY_QR_URL, NUXT_PUBLIC_PROMPTPAY_ID (เลขพร้อมเพย์ → สร้าง QR ในเบราว์เซอร์), NUXT_PUBLIC_PROMPTPAY_QR_INCLUDE_AMOUNT=true ฝังยอดใน QR (บางแอปสแกนไม่ได้ — ปล่อยว่าง/false แนะนำ), NUXT_IMAGE_DOMAINS
#   DB_PASSWORD ถ้า Nuxt build ต้องคุย MySQL ภายนอก
#
# Traefik (เฉพาะ app): cert resolver ชื่อ letsencrypt — ถ้า Dokploy ใช้ชื่ออื่น แก้ labels ของ app

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yardsale}
      POSTGRES_USER: ${POSTGRES_USER:-yardsale}
      # ถ้า Dokploy ไม่ส่ง env เข้า compose ค่าว่างทำให้ Postgres ล้ม — ค่า default นี้ให้ stack ขึ้นได้; ควร override ใน Dokploy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - yardsale_postgres_data:/var/lib/postgresql/data
    # ใช้ user/db ตรงกับค่า default — ถ้าเปลี่ยน POSTGRES_USER / POSTGRES_DB ใน env ต้องแก้ healthcheck ให้ตรง
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "yardsale", "-d", "yardsale"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-yardsale}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-yardsale}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      PUBLIC_UPLOAD_BASE: ${PUBLIC_UPLOAD_BASE:-/uploads}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yardsaleth.com,https://www.yardsaleth.com}
      SLIPOK_BRANCH_ID: ${SLIPOK_BRANCH_ID:-}
      SLIPOK_API_KEY: ${SLIPOK_API_KEY:-}
      SLIPOK_API_BASE: ${SLIPOK_API_BASE:-https://api.slipok.com}
      SLIPOK_LOG_DEFAULT: ${SLIPOK_LOG_DEFAULT:-true}
    volumes:
      - yardsale_uploads:/app/uploads
    # ต้อง publish 0.0.0.0:4000 เพื่อให้ Caddy (container) ยิงมาที่ 172.17.0.1:4000 ได้ — ถ้าใช้ 127.0.0.1:4000 อย่างเดียว bridge จะ connection refused
    # กัน port scan ได้ด้วย firewall บน VPS (อนุญาตแค่ Cloudflare / IP คุณถ้าต้องการ)
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/products').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        DB_HOST: ${DB_HOST:-157.85.98.150:3306}
        DB_NAME: ${DB_NAME:-nuxtcommerce_db}
        DB_USER: ${DB_USER:-root}
        BASE_URL: ${BASE_URL:-https://yardsaleth.com}
        NUXT_PUBLIC_CMS_API_BASE: ${NUXT_PUBLIC_CMS_API_BASE:-https://api.yardsaleth.com/api}
        NUXT_PUBLIC_YARDSALE_BACKEND_ORIGIN: ${NUXT_PUBLIC_YARDSALE_BACKEND_ORIGIN:-https://api.yardsaleth.com}
        NUXT_PUBLIC_STORE_BANK_TRANSFER_INFO: ${NUXT_PUBLIC_STORE_BANK_TRANSFER_INFO:-}
        NUXT_PUBLIC_PROMPTPAY_QR_URL: ${NUXT_PUBLIC_PROMPTPAY_QR_URL:-}
        NUXT_PUBLIC_PROMPTPAY_ID: ${NUXT_PUBLIC_PROMPTPAY_ID:-}
        NUXT_PUBLIC_PROMPTPAY_QR_INCLUDE_AMOUNT: ${NUXT_PUBLIC_PROMPTPAY_QR_INCLUDE_AMOUNT:-false}
        NUXT_IMAGE_DOMAINS: ${NUXT_IMAGE_DOMAINS:-api.yardsaleth.com,yardsaleth.com,www.yardsaleth.com}
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      BASE_URL: ${BASE_URL:-https://yardsaleth.com}
      DB_HOST: ${DB_HOST:-157.85.98.150:3306}
      DB_NAME: ${DB_NAME:-nuxtcommerce_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # เว็บหลัก — apex
      - "traefik.http.routers.yardsaleth-app.rule=Host(`yardsaleth.com`)"
      - "traefik.http.routers.yardsaleth-app.entrypoints=websecure"
      - "traefik.http.routers.yardsaleth-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.yardsaleth-app.middlewares=yardsaleth-compress"
      - "traefik.http.routers.yardsaleth-app.service=yardsaleth-app"
      - "traefik.http.services.yardsaleth-app.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.yardsaleth-compress.compress=true"
      # www → https://yardsaleth.com/...
      - "traefik.http.routers.yardsaleth-www.rule=Host(`www.yardsaleth.com`)"
      - "traefik.http.routers.yardsaleth-www.entrypoints=websecure"
      - "traefik.http.routers.yardsaleth-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.yardsaleth-www.middlewares=yardsaleth-www-to-apex"
      - "traefik.http.routers.yardsaleth-www.service=yardsaleth-app"
      - "traefik.http.middlewares.yardsaleth-www-to-apex.redirectregex.permanent=true"
      - "traefik.http.middlewares.yardsaleth-www-to-apex.redirectregex.regex=^https?://www\\.yardsaleth\\.com/(.*)"
      - "traefik.http.middlewares.yardsaleth-www-to-apex.redirectregex.replacement=https://yardsaleth.com/$${1}"

networks:
  dokploy-network:
    external: true

volumes:
  yardsale_postgres_data:
  yardsale_uploads:
