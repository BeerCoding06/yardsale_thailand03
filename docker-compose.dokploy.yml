version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yardsale}
      POSTGRES_USER: ${POSTGRES_USER:-yardsale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - yardsale_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "yardsale", "-d", "yardsale"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-yardsale}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-yardsale}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      PUBLIC_UPLOAD_BASE: ${PUBLIC_UPLOAD_BASE:-/uploads}
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - yardsale_uploads:/app/uploads
    # สำหรับ host ที่มี Caddy จับ :443 — reverse_proxy มา 127.0.0.1:4000 (จาก container ใช้ 172.17.0.1 หรือ host.docker.internal)
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/products').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BASE_URL: ${BASE_URL}
      NUXT_PUBLIC_CMS_API_BASE: ${NUXT_PUBLIC_CMS_API_BASE:-http://backend:4000/api}
      NUXT_PUBLIC_YARDSALE_BACKEND_ORIGIN: ${NUXT_PUBLIC_YARDSALE_BACKEND_ORIGIN:-http://backend:4000}
      NUXT_IMAGE_DOMAINS: ${NUXT_IMAGE_DOMAINS:-backend}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  yardsale_postgres_data:
  yardsale_uploads:
