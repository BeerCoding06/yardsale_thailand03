version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yardsale}
      POSTGRES_USER: ${POSTGRES_USER:-yardsale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - yardsale_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "yardsale", "-d", "yardsale"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      HOST: "0.0.0.0"
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-yardsale}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-yardsale}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      PUBLIC_UPLOAD_BASE: ${PUBLIC_UPLOAD_BASE:-/uploads}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # FCM (optional) — path ใน container หรือ JSON ทั้งก้อน (Dokploy secret)
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS:-}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
    volumes:
      - yardsale_uploads:/app/uploads
    # เปิด 4000 บน host ทุก interface — Caddy ใน Docker ยิง 172.17.0.1:4000 ได้ (127.0.0.1-only จะ refused)
    ports:
      - "4000:4000"
    # ไม่ใส่ healthcheck ที่นี่ (เทียบ 2c6f0be: เดิมใช้ /api/products → unhealthy ง่าย; + HEALTHCHECK ใน Dockerfile ทำให้ Dokploy ยังเห็น unhealthy)
    # frontend รอแค่ service_started — ไม่ผูกกับสถานะ healthy ของ backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    # รอแค่ backend ขึ้น container — ไม่รอ service_healthy (healthcheck ล้มบ่อยจาก timing/IPv4 ทำให้ deploy ทั้ง stack fail)
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      BASE_URL: ${BASE_URL}
      NUXT_PUBLIC_CMS_API_BASE: ${NUXT_PUBLIC_CMS_API_BASE:-http://backend:4000/api}
      NUXT_PUBLIC_YARDSALE_BACKEND_ORIGIN: ${NUXT_PUBLIC_YARDSALE_BACKEND_ORIGIN:-http://backend:4000}
      NUXT_IMAGE_DOMAINS: ${NUXT_IMAGE_DOMAINS:-backend}
      # FCM: URL ฝั่งเบราว์เซอร์ชี้ API ที่มี /api/save-token (production = https://api... ไม่ใช้ชื่อ service Docker)
      NUXT_PUBLIC_LARAVEL_API_BASE: ${NUXT_PUBLIC_LARAVEL_API_BASE:-}
      NUXT_PUBLIC_FIREBASE_API_KEY: ${NUXT_PUBLIC_FIREBASE_API_KEY:-}
      NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NUXT_PUBLIC_FIREBASE_PROJECT_ID: ${NUXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NUXT_PUBLIC_FIREBASE_APP_ID: ${NUXT_PUBLIC_FIREBASE_APP_ID:-}
      NUXT_PUBLIC_FIREBASE_VAPID_KEY: ${NUXT_PUBLIC_FIREBASE_VAPID_KEY:-}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  yardsale_postgres_data:
  yardsale_uploads:
